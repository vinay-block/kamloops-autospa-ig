name: Daily AutoSpa Posts

on:
  schedule:
    - cron: "0 15 * * *"    # slot 0 — morning (08:00 Kamloops)
    - cron: "0 20 * * *"    # slot 1 — midday (13:00 Kamloops)
    - cron: "0 1  * * *"    # slot 2 — evening (18:00 Kamloops)
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot to post (0,1,2)"
        default: "0"

permissions:
  contents: write            # allows creating the Release that hosts the video

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick slot
        id: slot
        run: |
          case "${{ github.event.schedule }}" in
            "0 15 * * *") echo "slot=0" >> $GITHUB_OUTPUT ;;
            "0 20 * * *") echo "slot=1" >> $GITHUB_OUTPUT ;;
            "0 1 * * *")  echo "slot=2" >> $GITHUB_OUTPUT ;;
            *) echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Locate project (handles any folder nesting)
        id: proj
        run: echo "dir=$(dirname "$(find . -name requirements.txt | head -1)")" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System deps (ffmpeg + cairo)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libcairo2

      - name: Python deps
        working-directory: ${{ steps.proj.outputs.dir }}
        run: pip install -r requirements.txt

      - name: Build + post
        working-directory: ${{ steps.proj.outputs.dir }}
        env:
          SLOT: ${{ steps.slot.outputs.slot }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python src/main.py --slot "${SLOT}"

      - name: Save no-repeat history
        if: success()
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          if [ -n "$(git status --porcelain history.json)" ]; then
            git config user.name  "autospa-bot"
            git config user.email "bot@users.noreply.github.com"
            git add history.json
            git commit -m "history: record posted video [skip ci]"
            git pull --rebase --autostash || true
            git push
          fi
