name: Daily AutoSpa Posts

# Kamloops is UTC-7 (PDT):
#   15:00 UTC = 08:00 local  -> slot 0
#   20:00 UTC = 13:00 local  -> slot 1
#   01:00 UTC = 18:00 local  -> slot 2  (the funny video)
#
# NOTE: the slot is derived from the UTC hour inside main.py, NOT from matching
# the cron string. String matching was fragile (a stray double space meant the
# evening run never matched, so the funny video never posted).
on:
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 20 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Slot to post (0=morning, 1=midday, 2=funny). Leave blank to auto-detect."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: autospa-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show trigger info
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "utc_hour=$(date -u +%H)"
          echo "manual_slot=${{ github.event.inputs.slot }}"

      - name: Locate project (handles any folder nesting)
        id: proj
        run: echo "dir=$(dirname "$(find . -name requirements.txt | head -1)")" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System deps (ffmpeg + cairo)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libcairo2

      - name: Python deps
        working-directory: ${{ steps.proj.outputs.dir }}
        run: pip install -r requirements.txt

      - name: Build + post
        working-directory: ${{ steps.proj.outputs.dir }}
        env:
          # Blank on scheduled runs -> main.py derives the slot from the UTC hour.
          SLOT: ${{ github.event.inputs.slot }}
          DRY_RUN: ${{ vars.DRY_RUN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          if [ -n "${SLOT}" ]; then
            python src/main.py --slot "${SLOT}"
          else
            python src/main.py
          fi

      - name: Save no-repeat history
        if: success()
        working-directory: ${{ steps.proj.outputs.dir }}
        run: |
          if [ -n "$(git status --porcelain history.json)" ]; then
            git config user.name  "autospa-bot"
            git config user.email "bot@users.noreply.github.com"
            git add history.json
            git commit -m "history: record posted video [skip ci]"
            git pull --rebase --autostash || true
            git push
          fi
